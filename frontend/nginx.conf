server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite buildet с base: '/new/' — фронт живёт под /new/
    location /new/ {
        try_files $uri $uri/ /new/index.html;
    }

    # Корень редиректит на /new/
    location = / {
        return 302 /new/;
    }

    # Длинный кеш для статики с хешами в имени
    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}